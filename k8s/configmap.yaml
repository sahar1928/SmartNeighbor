apiVersion: v1
kind: ConfigMap
metadata:
  name: smartneighbor-config
  labels:
    app.kubernetes.io/name: smartneighbor
data:
  NODE_ENV: "production"
  PORT: "3000"
  APP_VERSION: "0.1.1"
  PUBLIC_BASE_URL: ""
  ENABLE_DEMO_RESET: "false"
  OPENAI_MODEL: "gpt-5.1"
  TELEGRAM_WEBHOOK_SECRET: "smartneighbor-telegram-dev-secret"
  REDIS_URL: "redis://smartneighbor-redis:6379"
  PAYPAL_MODE: "sandbox"
  BIT_MODE: "simulator"
  BIT_PAYMENT_PRODUCT: "domestic-credit-transfers"
