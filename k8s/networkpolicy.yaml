apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: smartneighbor-app-egress
  labels:
    app.kubernetes.io/name: smartneighbor
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: smartneighbor
      app.kubernetes.io/component: app
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: smartneighbor
              app.kubernetes.io/component: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: smartneighbor
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
